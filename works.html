<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Works</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body data-page="works">
  <header class="site-header">
    <a class="site-logo" href="./index.html" aria-label="Go to landing page">
      <img src="./assets/img/logo.png" alt="Camilla Bertossi logo">
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      <a href="./who-am-i.html">whoamI?</a>
      <a href="./works.html">works</a>
      <a href="./contacts.html">contacts</a>
    </nav>
  </header>

  <main>
    <!-- Edit the subjects list here. Each link opens subject.html with a subject id. -->
    <section class="works-page">
      <div class="works-subjects">
        <a class="works-subject works-subject-graphic" href="./subject.html?subject=graphic-design">
          <span>Graphic</span>
          <span class="works-folder" aria-hidden="true">
            <img class="works-subject-preview" src="./assets/img/graphic-design.png" alt="">
            <img class="works-folder-image" src="./assets/img/folder.png" alt="">
          </span>
          <span>Design</span>
        </a>

        <a class="works-subject works-subject-illustration" href="./subject.html?subject=illustrazione">
          <span class="works-folder" aria-hidden="true">
            <img class="works-subject-preview" src="./assets/img/illustrazione.png" alt="">
            <img class="works-folder-image" src="./assets/img/folder.png" alt="">
          </span>
          <span>Illustrazione</span>
        </a>

        <a class="works-subject works-subject-video" href="./subject.html?subject=digital-video">
          <span>Digital</span>
          <span class="works-folder" aria-hidden="true">
            <img class="works-subject-preview" src="./assets/img/digital-video.png" alt="">
            <img class="works-folder-image" src="./assets/img/folder.png" alt="">
          </span>
          <span>Video</span>
        </a>
      </div>
    </section>
  </main>

  <script src="./assets/js/main.js"></script>
</body>
</html>
